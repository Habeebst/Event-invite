<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Invite| wedding Invite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=MonteCarlo&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;

        }

        section {
            height: 100vh;
            width: 700px;
            background-color: rgb(0, 0, 128);
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-family: "MonteCarlo", cursive;
            font-weight: bold;
            font-style: normal;
            border: 1px solid gold;
            width: 80px;
            height: 100px;
            margin: -20px auto 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 25px 5px;
        }

        .heading {
            padding-top: 10px;

        }

        h2 {
            font-family: "MonteCarlo", cursive;
            font-weight: 400;
            font-style: normal;
        }

        p {
            font-family: "Source Sans 3", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
        }

        .square-cont {
            background-color: aliceblue;
            width: 400px;
            display: flow-root;
            position: relative;
            border-left: 2px solid gold;
            border-right: 2px solid gold;
        }

        .name-cont {
            margin-bottom: 20px;
        }

        .spouse {
            font-size: 40px;
            line-height: 40px;
        }

        .text {
            padding: 15px;
            font-size: 14px;
            /* width: 350px; */
        }

        .fam {
            padding: 5px;
        }

        .curve {
            background-color: aliceblue;
            height: 610px;
            width: 320px;
            top: 6px;
            border-radius: 150px;
            position: absolute;
            place-self: center;
            border: 2px solid gold;
        }

        .bottom-text {
            text-align: left;
            margin-left: 90px;
            padding-top: 5px;
            margin-bottom: 10px;
        }

        .bottom-text div {
            padding-bottom: 5px;
        }

        .day {
            font-weight: 600;
            font-size: 18px;
            padding-bottom: 5px;
        }

        .venue {
            font-weight: 600;
        }

        sup {
            font-size: 11px;
            margin-top: -30px;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <section>
        <div class="curve"></div>
        <div class="square-cont">
            <div class="heading">
                <h1>HA<sup>26</sup></h1>
            </div>

            <p class="fam">The Families of</p>
            <p class="fam">Mr. Ibrahim Tope & Dr.Abdullah Kayode</p>
            <p class="text">Have the pleasure to invite you to the wedding of their beloved son and daughter</p>
            <div class="name-cont">
                <h2 class="spouse">Habeeb Smith</h2>
                <h2>&</h2>
                <h2 class="spouse">Amina Ajoke</h2>
            </div>
            <p class="day">Saturday</p>
            <p>18 &#10072; October &#10072; 2026</p>
            <div class="bottom-text">
                <p><span class="venue">Time: </span><time datetime="4:00pm">4:00pm</time></p>
                <p><span class="venue">Venue: </span><span>Hilton Hotel</span></p>
            </div>
        </div>
    </section>
</body>

</html>
